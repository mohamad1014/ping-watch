name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: postgresql+psycopg://pingwatch:pingwatch@localhost:5432/pingwatch
      POSTGRES_URL: postgresql://pingwatch:pingwatch@localhost:5432/pingwatch
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pingwatch
          POSTGRES_PASSWORD: pingwatch
          POSTGRES_DB: pingwatch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pingwatch -d pingwatch"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install backend dependencies
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Install worker dependencies
        run: |
          python -m venv worker/.venv
          worker/.venv/bin/pip install -r worker/requirements.txt -r worker/requirements-dev.txt

      - name: Install Playwright browser + system deps
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Docs consistency
        run: ./scripts/check-docs-consistency

      - name: Migration check
        run: ./scripts/check-migrations

      - name: Rollback drill
        run: ./scripts/staging-rollback-drill

      - name: Unit tests
        run: ./scripts/test-unit

      - name: Integration tests
        run: ./scripts/test-integration

      - name: E2E tests
        run: ./scripts/test-e2e
